name: CI Pipeline
permissions:
  contents: read
on:
  push:
    branches: [ main ]  # Only run on pushes to main
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]  # Run on PRs to main

jobs:
  lint:
    name: Lint
    runs-on: macos-latest  # macOS for sesh (Keychain dependency)
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Download Go modules
        run: go mod download

      - name: Install goimports
        run: go install golang.org/x/tools/cmd/goimports@latest

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh | sh -s -- -b $(go env GOPATH)/bin v2.6.2
          golangci-lint --version

      - name: Check code formatting
        run: |
          UNFORMATTED=$(goimports -l -local github.com/bashhack/sesh $(find . -name '*.go' -not -path './vendor/*' -not -path './scripts/*'))
          if [ -n "$UNFORMATTED" ]; then
            echo "❌ The following files need formatting:"
            echo "$UNFORMATTED"
            echo ""
            echo "Run: make format"
            exit 1
          fi
          echo "✅ All files properly formatted"

      - name: Run go vet
        run: go vet $(go list ./... | grep -v /scripts)

      - name: Run golangci-lint
        run: golangci-lint run ./...

  test:
    name: Test
    runs-on: macos-latest  # macOS for sesh (Keychain dependency)
    needs: [lint]
    strategy:
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Download Go modules
        run: go mod download

      - name: Run unit tests with coverage
        run: |
          go test -coverprofile=coverage.txt $(go list ./... | grep -v /scripts)
          grep -v "testutil\|mock\|provider/interfaces.go\|scripts/\|cmd/sesh/main.go" coverage.txt > coverage.filtered.txt || true
          go tool cover -html=coverage.filtered.txt -o coverage.html
          rm -f coverage.filtered.txt

      - name: Run tests with race detection
        run: |
          CORES=$(sysctl -n hw.logicalcpu 2>/dev/null || echo 4)
          RACE_CORES=$([ $CORES -gt 4 ] && echo 4 || echo $CORES)
          GOMAXPROCS=$RACE_CORES go test -race -vet=off $(go list ./... | grep -v /scripts)

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage-report
          path: ./coverage.html

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.txt
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Build binary
        run: make build

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: sesh-binary
          path: ./build/sesh
          if-no-files-found: error

  release:
    name: Release
    runs-on: macos-latest  # macOS for sesh
    needs: [test]
    if: github.ref_type == 'tag'

    # Requires a 'RELEASE_TOKEN' secret (personal access token with 'repo' permissions)
    # The token allows GitHub release creation to trigger subsequent workflow runs

    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
          workdir: .
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
