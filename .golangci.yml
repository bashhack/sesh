# golangci-lint configuration
# See https://golangci-lint.run/docs/configuration/

version: "2"

run:
  # Timeout for analysis
  timeout: 5m

linters:
  # Default linters (errcheck, govet, ineffassign, staticcheck, unused) are enabled automatically
  # Only add additional linters here
  enable:
    - gocritic       # Diagnostics for bugs, performance and style issues
    - gosec          # Security problems
    - misspell       # Commonly misspelled English words
    - modernize      # Detects use of legacy code and suggests modern alternatives
    - unconvert      # Unnecessary type conversions
    - unparam        # Unused function parameters

  settings:
    staticcheck:
      # Disable QF1008 check - explicit embedded field names preferred for clarity
      checks: ["all", "-QF1008"]

    govet:
      # Enable all analyzers
      enable-all: true

    errcheck:
      # Don't check for unchecked errors in type assertions
      check-type-assertions: false
      # Check for blank assignments
      check-blank: true

    gosec:
      # To specify a set of rules to explicitly exclude
      excludes:
        - G101 # False positives on token purpose constants, SQL column names, error messages
        - G104 # Audit errors not checked - we use errcheck for this

    gocritic:
      # Enable multiple checks
      enabled-tags:
        - diagnostic
        - style
        - performance
      disabled-checks:
        - unnamedResult # Allow unnamed results

  exclusions:
    # Directories and files to skip
    paths:
      - vendor
      - bin
      - build
      - docs
      - todo
      - scripts
      - ".*\\.pb\\.go$"
      - ".*_generated\\.go$"

    rules:
      # Exclude security and style linters from test files and test utilities —
      # test helper processes (exec.Command with os.Args[0]) are a standard
      # Go pattern, not a security concern.
      - path: (_test\.go|internal/testutil/)
        linters:
          - gosec
          - gocritic

      # Exclude shadow checking on the variable named err
      - text: 'shadow: declaration of "err"'
        linters:
          - govet

      # Exclude QF1008 - explicit embedded field names preferred for clarity
      - linters:
          - staticcheck
        text: "QF1008:"

issues:
  # Maximum issues count per one linter
  max-issues-per-linter: 0

  # Maximum count of issues with the same text
  max-same-issues: 0
